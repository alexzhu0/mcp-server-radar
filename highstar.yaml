name: mcp-server-radar
one_liner: Scan MCP server manifests into a searchable capability index.
target_user: MCP and agent developers
pain_point: MCP server lists are hard to compare by capability, transport, and risk.
demo_command: PYTHONPATH=src python3 -m mcp_server_radar examples/servers.json
topics:
  - ai-tools
  - mcp
  - agents
  - cli
  - developer-tools
  - llmops
release_channel:
  - github
  - relevant-developer-communities
launch_copy:
  - I built mcp-server-radar: Scan MCP server manifests into a searchable capability index.
  - The pain: MCP server lists are hard to compare by capability, transport, and risk.
  - Try it with: PYTHONPATH=src python3 -m mcp_server_radar examples/servers.json
quality_gate:
  commands:
    - python3 -m unittest discover -s tests
metrics_goal:
  day_1_stars: 5
  day_3_stars: 15
  day_7_stars: 50
